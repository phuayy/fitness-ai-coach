services:
  inference-api:
    build:
      context: ./services/inference-api
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./services/inference-api/models:/app/models:ro
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_HTTP_URL: ${VITE_API_HTTP_URL:-http://127.0.0.1:8000}
        VITE_API_WS_URL: ${VITE_API_WS_URL:-ws://127.0.0.1:8000}
    ports:
      - "8080:80"
    depends_on:
      - inference-api
    restart: unless-stopped

